[features]
multi_agent = true

[agents]
max_threads = 10
max_depth = 1

[agents.default]
description = "general-purpose fallback role."
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

[agents.worker]
description = "execution-focused role for implementation and fixes."
config_file = "agents/worker.toml"

[agents.explorer]
description = “Fast codebase explorer for read-heavy tasks.”
config_file = "agents/explorer.toml"

[agents.awaitor]
description = “Long-running command and task monitoring role.”
config_file = "agents/awaitor.toml"

[agents.reviewer]
description = "PR reviewer focused on correctness, security, and missing tests."
config_file = "agents/reviewer.toml"